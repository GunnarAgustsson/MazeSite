<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Dungeon Maze — navigate a randomly generated dungeon to find the exit." />
  <title>Dungeon Maze</title>

  <!-- Global tokens & reset -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Utility classes -->
  <link rel="stylesheet" href="css/utilities.css" />

  <!-- Component styles -->
  <link rel="stylesheet" href="components/viewport/viewport.css" />
  <link rel="stylesheet" href="components/timer/timer.css" />
  <link rel="stylesheet" href="components/settings/settings.css" />
  <link rel="stylesheet" href="components/start-screen/start-screen.css" />
  <link rel="stylesheet" href="components/win-screen/win-screen.css" />
  <link rel="stylesheet" href="components/tiles/win-tile/win-tile.css" />
</head>
<body>

  <!-- ================================================================
       START SCREEN
       ================================================================ -->
  <section id="start-screen" class="screen" role="main" aria-label="Start screen">
    <div class="start-inner">

      <h1 class="start-title">Dungeon<br/>Maze</h1>

      <p class="start-subtitle">
        A cursed dungeon stretches endlessly beneath you.<br/>
        Find the exit. Escape before the darkness swallows you whole.
      </p>

      <div class="start-rune-divider" aria-hidden="true">⚔ ✦ ⚔</div>

      <!-- Leaderboard -->
      <div class="leaderboard panel" aria-label="Best times leaderboard">
        <h3 class="lb-title">⏱ Best Times</h3>
        <ol id="leaderboard-list" class="lb-list">
          <li class="lb-empty">No runs yet — be the first!</li>
        </ol>
      </div>

      <div class="start-rune-divider" aria-hidden="true">⚔ ✦ ⚔</div>

      <div class="start-actions">
        <button id="btn-start" class="btn btn-primary" type="button">
          Enter the Dungeon
        </button>
        <button
          id="btn-settings-toggle"
          class="btn-icon"
          type="button"
          aria-label="Toggle settings"
          title="Settings"
        >⚙</button>
      </div>

      <!-- Settings panel -->
      <div
        id="settings-panel"
        class="panel state-hidden"
        role="region"
        aria-label="Settings"
      >
        <h3>Settings</h3>
        <label class="checkbox-label" for="timer-visible-checkbox">
          <input
            type="checkbox"
            id="timer-visible-checkbox"
            checked
          />
          Show timer during game
        </label>
      </div>

    </div>
  </section>

  <!-- ================================================================
       GAME SCREEN
       ================================================================ -->
  <section id="game-screen" class="screen screen-hidden" role="main" aria-label="Game screen">

    <!-- 3×3 rolling viewport -->
    <div id="viewport-outer" aria-hidden="true">
      <div id="viewport-grid">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
      </div>
    </div>

    <!-- Timer (visible in top-right corner; toggled by settings) -->
    <div id="timer-display" class="state-hidden" aria-live="off" aria-label="Timer">
      00:00.00
    </div>

  </section>

  <!-- ================================================================
       WIN SCREEN
       ================================================================ -->
  <section id="win-screen" class="screen screen-hidden" role="main" aria-label="Win screen">
    <div class="win-inner">

      <h1 class="win-title">You Escaped!</h1>
      <p class="win-subtitle">The dungeon could not hold you.</p>

      <div class="win-time-block" aria-label="Your escape time">
        <span class="win-time-label">Escape time</span>
        <span id="win-time" class="win-time-value">00:00.00</span>
      </div>

      <button id="btn-play-again" class="btn btn-primary" type="button">
        Enter Again
      </button>

    </div>
  </section>

  <!-- ================================================================
       SCRIPTS  (ES modules; load order matches dependency graph)
       ================================================================ -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
